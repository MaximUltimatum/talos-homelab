# Note, you need to make this thing for EACH NAMESPACE you want the cert to be valid for
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: budget.maximstroud.de-cert
  namespace: actual
spec:
  dnsNames:
    - budget.maximstroud.de
  secretName: budget.maximstroud.de-cert
  issuerRef:
    name: letsencrypt-cloudflare-issuer
    kind: ClusterIssuer
