apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cluster-sandbox
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:17
  instances: 1
  bootstrap:
    recovery:
      source: source
  externalClusters:
  - name: source
    plugin:
      name: barman-cloud.cloudnative-pg.io
      parameters:
        barmanObjectName: aws-store
        serverName: cluster-vikunja
  storage:
    size: 8Gi
