apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgresql
spec:
  instances: 1
  bootstrap:
    initdb:
      database: homeassistant
      secret:
        name: homeassistant-db-creds
  storage:
    size: 8Gi
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: aws-store
