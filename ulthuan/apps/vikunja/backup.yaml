apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: daily-vikunja-backup
spec:
  schedule: "0 0 0 * * *"  # At midnight every day, custom cnpg cron expression
  backupOwnerReference: self
  cluster:
    name: cluster-vikunja
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
