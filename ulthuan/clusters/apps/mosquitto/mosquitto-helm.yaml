---
apiVersion: v1
kind: Namespace
metadata:
  name: mosquitto
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: &app mosquitto
  namespace: *app
spec:
  interval: 15m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 5.0.1
  url: oci://ghcr.io/bjw-s-labs/helm/app-template
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app mosquitto
  namespace: *app
spec:
  chartRef:
    kind: OCIRepository
    name: *app
    namespace: *app 
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1001
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile:
          type: RuntimeDefault

    configMaps:
      config:
        data:
          mosquitto.conf: |
            # Authentication: allow both anonymous and authenticated clients
            allow_anonymous true
            password_file /mosquitto/config/passwd
            
            # Persistence
            persistence true
            persistence_location /data
            autosave_interval 60
            
            # Performance & Logging
            connection_messages false
            per_listener_settings false
            
            # Standard MQTT listener
            listener 1883 0.0.0.0
            protocol mqtt
            
            # WebSocket listener (for web clients)
            listener 9001 0.0.0.0
            protocol websockets

    controllers:
      mosquitto:
        containers:
          app:
            image:
              repository: public.ecr.aws/docker/library/eclipse-mosquitto
              tag: 2.0.22
            env:
              TZ: America/Chicago
            probes:
              liveness:
                enabled: true
                type: TCP
                spec:
                  port: 1883
              readiness:
                enabled: true
                type: TCP
                spec:
                  port: 1883
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 100Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
              readOnlyRootFilesystem: true

    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /data
      config-file:
        type: configMap
        name: mosquitto
        globalMounts:
          - path: /mosquitto/config/mosquitto.conf
            subPath: mosquitto.conf
            readOnly: true

    service:
      mqtt:
        controller: mosquitto
        ports:
          mqtt:
            port: 1883
            protocol: TCP
          websocket:
            port: 9001
            protocol: TCP
        type: LoadBalancer
        externalTrafficPolicy: Local
        loadBalancerIP: 10.0.6.50
