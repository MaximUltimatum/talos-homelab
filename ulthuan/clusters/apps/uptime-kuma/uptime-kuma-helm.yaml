apiVersion: v1
kind: Namespace
metadata:
  name: uptime-kuma
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: uptime-kuma
  namespace: uptime-kuma
spec:
  interval: 15m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 4.6.2
  url: oci://ghcr.io/bjw-s-labs/helm/app-template
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app uptime-kuma
  namespace: *app
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  targetNamespace: *app
  values:
    controllers:
      uptime-kuma:
        containers:
          app:
            image:
              repository: ghcr.io/louislam/uptime-kuma
              tag: 2.2.0-slim@sha256:6b1adfcc5bd219c95dadaa67a7f94718af905d6b8512f598383da84a105a6c73
              pullPolicy: IfNotPresent
            command:
              - node
              - server/server.js
            env:
              UPTIME_KUMA_DB_TYPE: sqlite
            probes:
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
              liveness:
                enabled: true
              readiness:
                enabled: true
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault

    service:
      uptime-kuma:
        controller: uptime-kuma
        ports:
          http:
            port: 3001

    ingress:
      main:
        enabled: true
        className: tailscale
        annotations:
          tailscale.com/hostname: uptime
        labels:
          tailscale.com/proxy-class: "irish-eyes"
        hosts:
          - host: uptime
            paths:
              - path: /
                pathType: ImplementationSpecific
                service:
                  identifier: uptime-kuma
                  port: http
        tls:
          - hosts:
              - uptime

    persistence:
      data:
        suffix: data
        accessMode: ReadWriteOnce
        size: 2Gi
        retain: true
        globalMounts:
          - path: /app/data

    serviceMonitor:
      main:
        enabled: true
        serviceName: uptime-kuma
        endpoints:
          - port: http
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 10s
