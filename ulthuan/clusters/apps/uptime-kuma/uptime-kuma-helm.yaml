apiVersion: v1
kind: Namespace
metadata:
  name: uptime-kuma
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: uptime-kuma
  namespace: uptime-kuma
spec:
  interval: 15m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 4.6.2
  url: oci://ghcr.io/bjw-s-labs/helm/app-template
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app uptime-kuma
  namespace: *app
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  targetNamespace: *app
  values:
    controllers:
      uptime-kuma:
        containers:
          app:
            image:
              repository: ghcr.io/louislam/uptime-kuma
              tag: 2.2.1
              pullPolicy: IfNotPresent
            command:
              - node
              - server/server.js
            env:
              UPTIME_KUMA_DB_TYPE: sqlite
            probes:
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
              liveness:
                enabled: true
              readiness:
                enabled: true

    service:
      uptime-kuma:
        controller: uptime-kuma
        type: LoadBalancer
        loadBalancerClass: tailscale
        annotations:
          tailscale.com/hostname: uptime
          tailscale.com/proxy-class: "irish-eyes"
        labels:
          tailscale.com/proxy-class: "irish-eyes"
        ports:
          http:
            port: 80
            targetPort: 3001
          https:
            port: 443
            targetPort: 3001


    persistence:
      data:
        suffix: data
        accessMode: ReadWriteOnce
        size: 2Gi
        retain: true
        globalMounts:
          - path: /app/data
